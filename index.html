<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pow {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .pow-animation {
            animation: pow 2s infinite ease-in-out;
        }
        .bg-halftone {
            background-color: #facc15; /* Yellow background */
            background-image: radial-gradient(#000 2.5px, transparent 2.5px);
            background-size: 24px 24px;
        }
        .comic-border {
            border: 4px solid #000;
        }
        .comic-shadow {
            box-shadow: 6px 6px 0px 0px #000;
            transition: all 0.1s ease;
        }
        .comic-shadow:active {
            box-shadow: 0px 0px 0px 0px #000;
            transform: translate(6px, 6px) rotate(-2deg);
        }
        .text-comic {
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        @keyframes popOut {
            0% { transform: translate(-50%, -50%) scale(0.1) rotate(0deg); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(1.2) rotate(var(--rot)); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5) rotate(calc(var(--rot) * 1.5)); opacity: 0; }
        }
        .comic-word {
            position: fixed;
            font-family: 'Bangers', cursive;
            font-size: 5rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 100;
            animation: popOut 0.6s ease-out forwards;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }
        @keyframes flipIn {
            0% { transform: perspective(600px) rotateY(-90deg) rotateZ(-2deg); opacity: 0; }
            100% { transform: perspective(600px) rotateY(0deg) rotateZ(-2deg); opacity: 1; }
        }
        @keyframes flipOut {
            0% { transform: perspective(600px) rotateY(0deg) rotateZ(-2deg); opacity: 1; }
            100% { transform: perspective(600px) rotateY(90deg) rotateZ(-2deg); opacity: 0; }
        }
        .flip-out { animation: flipOut 0.3s ease-in forwards; }
        .flip-in { animation: flipIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-yellow-400 text-black font-['Comic_Neue'] font-bold flex items-center justify-center min-h-screen overflow-hidden">
    <!-- Decorative Halftone Background -->
    <div class="absolute inset-0 bg-halftone opacity-20 z-0"></div>

    <div class="relative z-20 text-center px-6 max-w-2xl mx-auto w-full">
        <!-- SVG Illustration (Explosion Burst) -->
        <div class="mb-6 pow-animation">
            <svg class="mx-auto w-64 h-64 md:w-80 md:h-80 drop-shadow-xl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Red Burst -->
                <path fill="#ef4444" stroke="#000" stroke-width="8" stroke-linejoin="round" d="M100 10 L125 50 L180 30 L150 85 L190 130 L135 140 L150 190 L100 155 L50 190 L65 140 L10 130 L50 85 L20 30 L75 50 Z" />
                <!-- Wrench -->
                <svg id="wrench-icon" onclick="triggerWrench()" class="cursor-pointer transition-colors duration-300" x="65" y="65" width="70" height="70" viewBox="0 0 24 24" fill="#60a5fa" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                </svg>
            </svg>
        </div>

        <!-- Update Message in a comic box -->
        <div id="update-box" onclick="spawnComicWord(event)" title="Click for action!" class="bg-white comic-border comic-shadow p-6 md:p-8 mb-10 transform -rotate-2 relative z-10 cursor-pointer select-none">
            <h1 class="text-5xl md:text-7xl font-['Bangers'] text-red-500 text-comic mb-4 tracking-widest uppercase transform -rotate-1">
                KABOOM!
            </h1>
            <p class="text-2xl md:text-3xl font-['Bangers'] text-blue-600 mb-2 uppercase tracking-wide">
                Updates in Progress!
            </p>
            <p class="text-lg md:text-xl text-black">
                We're tinkering away in our secret lair to bring you epic new features! Hang tight, hero!
            </p>
        </div>

        <!-- Help Link -->
        <div class="mt-12 bg-white inline-block px-6 py-2 comic-border comic-shadow transform rotate-2">
            <p class="text-lg text-black font-bold uppercase">
                Need a sidekick? <a href="#" class="text-red-500 hover:text-blue-600 underline decoration-4 underline-offset-2">Contact Support</a>
            </p>
        </div>
    </div>

    <script>
        let clickCount = 0;
        let lastClickTime = 0;
        let secretArmed = false;
        let secretUnlocked = false;

        function spawnComicWord(e) {
            // Secret knock logic (5 rapid clicks on box arms the secret)
            if (!secretUnlocked && !secretArmed) {
                const now = Date.now();
                if (now - lastClickTime < 600) { // Max 600ms between clicks
                    clickCount++;
                } else {
                    clickCount = 1;
                }
                lastClickTime = now;

                if (clickCount >= 5) {
                    secretArmed = true;
                }
            }

            const words = ['POW!', 'BAM!', 'ZAP!', 'WHAM!', 'BOOM!', 'CRASH!', 'BIFF!', 'SMASH!'];
            const colors = ['#ef4444', '#3b82f6', '#22c55e', '#a855f7', '#f97316', '#facc15'];
            
            const word = words[Math.floor(Math.random() * words.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const el = document.createElement('div');
            el.textContent = word;
            el.className = 'comic-word';
            el.style.color = color;
            
            // Random rotation between -25deg and +25deg
            const rot = (Math.random() * 50 - 25) + 'deg';
            el.style.setProperty('--rot', rot);
            
            // Position near the cursor
            const x = e.clientX + (Math.random() * 40 - 20);
            const y = e.clientY + (Math.random() * 40 - 20);
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            
            document.body.appendChild(el);
            
            // Clean up element after animation finishes
            setTimeout(() => {
                el.remove();
            }, 600);
        }

        function triggerWrench() {
            if (secretArmed && !secretUnlocked) {
                secretUnlocked = true;
                
                unlockSecret();
            }
        }

        function unlockSecret() {
            const box = document.getElementById('update-box');
            
            // Flip out animation
            box.classList.add('flip-out');
            
            setTimeout(() => {
                // Change content halfway through the flip
                box.innerHTML = `
                    <h1 class="text-4xl md:text-5xl font-['Bangers'] text-green-500 text-comic mb-4 tracking-widest uppercase transform -rotate-1">
                        ACCESS GRANTED!
                    </h1>
                    <p class="text-xl md:text-2xl font-['Bangers'] text-black mb-4 uppercase tracking-wide">
                        Welcome to the Secret Base!
                    </p>
                    <div class="bg-black text-green-400 font-mono text-sm md:text-base p-4 mt-2 rounded border-2 border-gray-800 text-left">
                        <p class="mb-1">> SYSTEM OVERRIDE INITIATED...</p>
                        <p class="mb-1">> DECRYPTING FILES...</p>
                        <p class="text-white font-bold animate-pulse mt-2">> REDIRECTING...</p>
                    </div>
                `;
                
                // Swap animation classes to flip back in with new content
                box.classList.remove('flip-out');
                box.classList.add('flip-in');

                // Redirect after reading delay (2.5 seconds)
                setTimeout(() => {
                    // Set unlock flag
                    localStorage.setItem('areebverse_unlocked', 'true');
                    window.location.href = './home.html';
                }, 2500);

            }, 300);
        }
    </script>
</body>
</html>
